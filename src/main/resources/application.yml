spring:
  application:
    name: Act-One
  profiles:
    # Default to dev for local runs.
    default: dev

  jpa:
    open-in-view: false

  mvc:
    throw-exception-if-no-handler-found: false

  mail:
    host: ${ACTONE_SMTP_HOST:smtp.gmail.com}
    port: ${ACTONE_SMTP_PORT:587}
    username: ${ACTONE_SMTP_USERNAME:}
    password: ${ACTONE_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${ACTONE_SMTP_AUTH:true}
          starttls:
            enable: ${ACTONE_SMTP_STARTTLS:true}
            required: ${ACTONE_SMTP_STARTTLS_REQUIRED:true}
          allowutf8: true
          connectiontimeout: 150000
          timeout: 150000
          writetimeout: 150000
        mime:
          charset: UTF-8
        transport:
          protocol: smtp
        mime.encodefilename: true
        smtp.sendpartial: true
        ssl:
          trust: ${ACTONE_SMTP_SSL_TRUST:${ACTONE_SMTP_HOST:smtp.gmail.com}}

logging:
  level:
    com.prarambh.act.one: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: OFF

  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg [requestId=%X{requestId}]%n"

actone:
  admin:
    purge-password: ${ACTONE_ADMIN_PASSWORD:}
  email:
    enabled: ${ACTONE_EMAIL_ENABLED:true}
    subject: "Your ticket with Prarambh Theatre has been issued"
    fromName: "Prarambh Theatre Group"
    from: ${ACTONE_EMAIL_FROM:${ACTONE_SMTP_USERNAME:}}
    bcc: ${ACTONE_EMAIL_BCC:}
  ticket-card:
    enabled: ${ACTONE_TICKET_CARD_ENABLED:true}
    # Default output dir no longer writes to project root.
    outputDir: ${ACTONE_TICKET_CARD_OUTPUT_DIR:}
    templateResource: ${ACTONE_TICKET_CARD_TEMPLATE:classpath:/static/Card.png}

management:
  endpoints:
    web:
      exposure:
        include: health,info
