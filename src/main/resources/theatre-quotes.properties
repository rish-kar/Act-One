# Motivational theatre/drama quotes used in emails.
# Format: quotes.<n>=<quote text> - <author>
quotes.1=The mission of the theatre, after all, is to change, to raise the consciousness of people to their human possibilities. - Arthur Miller
quotes.2=We are such stuff as dreams are made on; and our little life is rounded with a sleep. - William Shakespeare
quotes.3=All the world's a stage, and all the men and women merely players. - William Shakespeare
quotes.4=The play's the thing wherein I'll catch the conscience of the king. - William Shakespeare
quotes.5=The theatre is the art of looking at ourselves. - Augusto Boal
quotes.6=The theatre is a spiritual and social X-ray of its time. - Lee Strasberg
quotes.7=The stage is not merely the meeting place of all the arts, but is also the return of art to life. - Oscar Wilde
quotes.8=We can be anything on stage; we can do anything on stage. - Ian McKellen
quotes.9=Acting is not about being someone different. It's finding the similarity in what is apparently different, then finding myself in there. - Meryl Streep
quotes.10=The theater is a safe place to do the unsafe things that need to be done. - John Patrick Shanley
quotes.11=The theatre is a place where people can be transformed. - Peter Brook
quotes.12=We don't stop playing because we grow old; we grow old because we stop playing. - George Bernard Shaw
quotes.13=The purpose of playing is to hold, as it were, the mirror up to nature. - William Shakespeare
quotes.14=The actor is a gladiator in an arena. - Stella Adler
quotes.15=You have to be brave to be yourself on stage. - Viola Spolin
quotes.16=There are no small parts, only small actors. - Konstantin Stanislavski
quotes.17=The theatre is the nursery of the arts. - Carlo Goldoni
quotes.18=The theatre is life; cinema is art; television is furniture. - Georges Brach
quotes.19=Theatre is the place where the invisible becomes visible. - Ariane Mnouchkine
quotes.20=The theatre is the place where people come to hear the truth about themselves. - David Mamet
quotes.21=The stage is a magic circle; on it we can dream together. - Helen Hayes
quotes.22=If you can walk and talk, you can act. - Stella Adler
quotes.23=In the theatre, you can change the world in an evening. - Tim Robbins
quotes.24=The theatre is a world of imagination; it invites us to become more human. - Laurence Olivier
quotes.25=The theatre is a verb before it is a noun, an act before it is a place. - Martha Graham
quotes.26=Art is not a mirror held up to reality but a hammer with which to shape it. - Bertolt Brecht
quotes.27=Theatre is a form of knowledge; it should and can also be a means of transforming society. - Augusto Boal
quotes.28=The theatre is a place where we face ourselves and learn to be kinder. - Judi Dench
quotes.29=To be or not to be: that is the question. - William Shakespeare
quotes.30=The theatre is a temple where human passions are purified. - Jean Cocteau
