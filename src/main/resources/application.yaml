spring:
  application:
    name: Act-One
  config:
    activate:
      on-profile: default
  profiles:
    active: default
  datasource:
    # Use a stable in-memory DB name so /h2-console can see the same database.
    url: jdbc:h2:mem:tickets;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  mail:
    host: ${ACTONE_SMTP_HOST:smtp.gmail.com}
    port: ${ACTONE_SMTP_PORT:587}
    username: ${ACTONE_SMTP_USERNAME:}
    password: ${ACTONE_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${ACTONE_SMTP_AUTH:true}
          starttls:
            enable: ${ACTONE_SMTP_STARTTLS:true}
            required: ${ACTONE_SMTP_STARTTLS_REQUIRED:true}
          allowutf8: true
          connectiontimeout: 150000
          timeout: 150000
          writetimeout: 150000
        mime:
          charset: UTF-8
        transport:
          protocol: smtp
        # Prefer quoted-printable for best compatibility with punctuation in plain/HTML
        mime.encodefilename: true
        smtp.sendpartial: true
        # Helps JavaMail trust the server cert chain on some Windows machines.
        ssl:
          trust: ${ACTONE_SMTP_SSL_TRUST:${ACTONE_SMTP_HOST:smtp.gmail.com}}

logging:
  level:
    com.prarambh.act.one: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: OFF

  pattern:
    # Include requestId from MDC (set by RequestLoggingFilter) if your logging backend supports it.
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg [requestId=%X{requestId}]%n"

actone:
  admin:
    purge-password: "prarambh-admin-delhi"
  email:
    enabled: ${ACTONE_EMAIL_ENABLED:true}
    subject: "Your ticket has been issued"
    fromName: "Act-One"
    from: ${ACTONE_EMAIL_FROM:${ACTONE_SMTP_USERNAME:}}
    bcc: ${ACTONE_EMAIL_BCC:}
  ticket-card:
    enabled: true
    outputDir: .
    templateResource: "classpath:/static/Card.jpeg"

management:
  endpoints:
    web:
      exposure:
        include: health,info
