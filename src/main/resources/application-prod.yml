spring:
  datasource:
    url: ${DB_URL:?DB_URL env var is required}
    username: ${DB_USERNAME:?DB_USERNAME env var is required}
    password: ${DB_PASSWORD:?DB_PASSWORD env var is required}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Increase housekeeping period to 5 minutes to avoid "Thread starvation or clock leap detected" warnings
      # in cloud environments where container pauses can cause timing issues
      housekeeping-period-ms: 300000
      # Reduce the frequency of validation to minimize pool overhead
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      minimum-idle: 2
      maximum-pool-size: 10

  jpa:
    hibernate:
      # Use 'update' to auto-create/update tables on startup
      ddl-auto: update
    properties:
      hibernate:
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  # Never run seed / init SQL in prod.
  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

  # Disable Flyway - Hibernate will manage schema
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG

server:
  port: ${PORT:8080}