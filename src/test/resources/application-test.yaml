spring:
  datasource:
    url: jdbc:h2:mem:tickets-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
logging:
  level:
    com.prarambh.act.one: INFO
actone:
  admin:
    purge-password: "prarambh-admin-delhi"
  email:
    enabled: false
    bcc: ""
  ticket-card:
    enabled: true
    templateResource: "classpath:/static/Card.jpeg"
